version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: turna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: turna
      POSTGRES_USER: turna
      POSTGRES_PASSWORD: turna
    ports:
      - "5432:5432"
    volumes:
      - turna_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: turna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - turna_redis_data:/data

volumes:
  turna_pg_data:
  turna_redis_data:
