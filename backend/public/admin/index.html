<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Turna Admin</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">T</div>
          <div>
            <div class="brand-title">Turna Admin</div>
            <div class="brand-subtitle">Operasyon merkezi</div>
          </div>
        </div>

        <div id="admin-meta" class="admin-meta hidden"></div>

        <nav id="sidebar-nav" class="sidebar-nav hidden">
          <button class="nav-item active" data-page="dashboard" type="button">Dashboard</button>
          <button class="nav-item" data-page="users" type="button">Kullanicilar</button>
          <button class="nav-item" data-page="contacts" type="button">Rehber</button>
          <button class="nav-item" data-page="reports" type="button">Sikayetler</button>
          <button class="nav-item" data-page="chats" type="button">Sohbetler</button>
          <button class="nav-item" data-page="messages" type="button">Mesajlar</button>
          <button class="nav-item" data-page="media" type="button">Medya</button>
          <button class="nav-item" data-page="sessions" type="button">Oturumlar</button>
          <button class="nav-item" data-page="calls" type="button">Aramalar</button>
          <button class="nav-item" data-page="push" type="button">Push</button>
          <button class="nav-item" data-page="otp" type="button">OTP / SMS</button>
          <button class="nav-item" data-page="countryPolicies" type="button">Ulke Politikalari</button>
          <button class="nav-item" data-page="featureFlags" type="button">Feature Flags</button>
          <button class="nav-item" data-page="auditLogs" type="button">Audit Log</button>
          <button class="nav-item" data-page="admins" type="button">Adminler</button>
          <button class="nav-item" data-page="system" type="button">Sistem</button>
        </nav>

        <button id="logout-button" class="ghost-button hidden" type="button">
          Cikis yap
        </button>
      </aside>

      <main class="content">
        <section id="login-view" class="panel login-panel">
          <div class="panel-heading">
            <div>
              <h1>Admin girisi</h1>
              <p>Kullanici, rehber, oturum, sohbet, medya ve sistem verilerini yonetin.</p>
            </div>
          </div>
          <form id="login-form" class="stack-form">
            <label class="field">
              <span>Kullanici adi</span>
              <input id="login-username" type="text" autocomplete="username" required />
            </label>
            <label class="field">
              <span>Sifre</span>
              <input id="login-password" type="password" autocomplete="current-password" required />
            </label>
            <button id="login-submit" class="primary-button" type="submit">
              Giris yap
            </button>
            <p id="login-error" class="error-text hidden"></p>
          </form>
        </section>

        <section id="app-view" class="hidden">
          <header class="panel topbar">
            <div>
              <h1 id="page-title">Dashboard</h1>
              <p id="page-subtitle" class="muted-text">Turna operasyon paneli.</p>
            </div>
          </header>

          <section class="summary-grid">
            <article class="metric-card">
              <span class="metric-label">Toplam kullanici</span>
              <strong id="metric-total-users">-</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Aktif oturum</span>
              <strong id="metric-active-sessions">-</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">24s mesaj</span>
              <strong id="metric-messages">-</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Acik sikayet</span>
              <strong id="metric-open-reports">-</strong>
            </article>
          </section>

          <section id="page-content" class="page-content"></section>
        </section>
      </main>
    </div>

    <script type="module" src="/admin/app.js"></script>
  </body>
</html>
